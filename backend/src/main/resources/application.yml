spring:
  application:
    name: masapay-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/masapay}
    username: ${SPRING_DATASOURCE_USERNAME:masapay}
    password: ${SPRING_DATASOURCE_PASSWORD:masapay}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # Fail fast: a failed or checksum-mismatched migration aborts startup.
    validate-on-migrate: true
    out-of-order: false
    # Never allow `flyway clean` to wipe a database, in any environment.
    clean-disabled: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

masapay:
  redis:
    # Enables the cache manager and pub/sub wiring; disabled in the infra-free smoke test.
    enabled: ${MASAPAY_REDIS_ENABLED:true}
    events-channel: ${MASAPAY_REDIS_EVENTS_CHANNEL:masapay:events}
  auth:
    # Enables the Google authentication endpoint; disabled in the infra-free smoke test.
    enabled: ${MASAPAY_AUTH_ENABLED:true}
    google:
      # Google OAuth2 client id; also the expected ID token audience. Supplied per environment.
      client-id: ${MASAPAY_GOOGLE_CLIENT_ID:}
    # Comma-separated emails bootstrapped as enabled SUPER_ADMINs on login (seeds the first admin).
    super-admin-emails: ${MASAPAY_SUPER_ADMIN_EMAILS:}
  jwt:
    # HMAC-SHA256 signing secret (>= 32 bytes). Override per environment; never ship the default.
    secret: ${MASAPAY_JWT_SECRET:masapay-dev-secret-change-me-0123456789-abcdefghij}
    issuer: ${MASAPAY_JWT_ISSUER:masapay}
    access-token-ttl: ${MASAPAY_JWT_ACCESS_TTL:PT15M}
    refresh-token-ttl: ${MASAPAY_JWT_REFRESH_TTL:P7D}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
