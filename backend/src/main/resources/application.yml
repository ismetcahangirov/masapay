spring:
  application:
    name: masapay-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/masapay}
    username: ${SPRING_DATASOURCE_USERNAME:masapay}
    password: ${SPRING_DATASOURCE_PASSWORD:masapay}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # Fail fast: a failed or checksum-mismatched migration aborts startup.
    validate-on-migrate: true
    out-of-order: false
    # Never allow `flyway clean` to wipe a database, in any environment.
    clean-disabled: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

masapay:
  redis:
    # Enables the cache manager and pub/sub wiring; disabled in the infra-free smoke test.
    enabled: ${MASAPAY_REDIS_ENABLED:true}
    events-channel: ${MASAPAY_REDIS_EVENTS_CHANNEL:masapay:events}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
